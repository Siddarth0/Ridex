name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Playwright is only used for local screenshots; never pull browsers in CI.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json's "packageManager" field — do not also
      # set `version:` here, or pnpm/action-setup@v4 errors on the ambiguity.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      # Non-blocking: surface known vulnerabilities in production deps without
      # failing the build (advisory noise shouldn't gate merges).
      - name: Dependency audit (advisory)
        run: pnpm audit --prod || true
